name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xdotool x11-utils

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Lint
        run: cargo clippy -- -D warnings

  release:
    runs-on: ${{ matrix.os }}
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: drift-tracker-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: drift-tracker-macos-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: drift-tracker-windows-amd64.exe

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xdotool x11-utils

      - name: Build release
        run: cargo build --release --verbose

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          copy target\release\drift-tracker.exe target\release\${{ matrix.artifact }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/release/drift-tracker target/release/${{ matrix.artifact }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/${{ matrix.artifact }}
          draft: false
          prerelease: false